name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Skip the `npm run build` step inside build.rs for all Rust jobs.
  # The dashboard is built independently in the frontend-tests job.
  TURBINEPROXY_SKIP_DASHBOARD_BUILD: "1"

jobs:
  # ── Fast checks (no MySQL needed) ──────────────────────────────────────────
  checks:
    name: Checks (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo clippy (unwrap lint on critical paths)
        run: |
          cargo clippy \
            --all-targets \
            -- \
            -D clippy::unwrap_used \
            --allow clippy::all \
            2>&1 | grep -E "^error\[clippy::unwrap_used\]" | \
            grep -E "src/(dashboard|analytics)/" | \
            (! grep .) || \
            (echo "clippy::unwrap_used found in critical paths" && exit 1)

  # ── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
      - name: npm audit (dashboard)
        run: npm audit --audit-level=high
        working-directory: dashboard
      - name: npm audit (docs)
        run: npm audit --audit-level=high
        working-directory: docs

  # ── Unit / doc tests (no MySQL needed) ─────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (bin unit tests)
        run: cargo test --bins

  # ── Code coverage ──────────────────────────────────────────────────────────
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage (unit tests only)
        run: cargo llvm-cov --bins --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Frontend tests (Vitest) ────────────────────────────────────────────────
  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  # ── Integration tests (real MySQL / MariaDB) ────────────────────────────────
  integration-tests:
    name: Integration — ${{ matrix.db-label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - db-label: MySQL 8.0
            db-image: mysql:8.0
            db-port: 3306
            health-cmd: "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          - db-label: MySQL 8.4
            db-image: mysql:8.4
            db-port: 3306
            health-cmd: "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          - db-label: MariaDB 10.11
            db-image: mariadb:10.11
            db-port: 3306
            health-cmd: "healthcheck.sh --connect --innodb_initialized"
          - db-label: MariaDB 11.4
            db-image: mariadb:11.4
            db-port: 3306
            health-cmd: "healthcheck.sh --connect --innodb_initialized"

    services:
      mysql:
        image: ${{ matrix.db-image }}
        env:
          # MySQL uses MYSQL_ROOT_PASSWORD; MariaDB accepts both.
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: turbineproxy_test
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: turbineproxy_test
        ports:
          - ${{ matrix.db-port }}:3306
        options: >-
          --health-cmd="${{ matrix.health-cmd }}"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=30s

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache per DB image so linker artefacts don't conflict.
          key: ${{ matrix.db-image }}

      # Build both the proxy binary and the test binary in one shot.
      - name: cargo build
        run: cargo build

      - name: Run integration tests
        env:
          TEST_MYSQL_HOST: 127.0.0.1
          TEST_MYSQL_PORT: ${{ matrix.db-port }}
          TEST_MYSQL_USER: root
          TEST_MYSQL_PASS: root
        # --test-threads=1 avoids DDL races between parallel tests.
        run: cargo test --test integration_tests -- --test-threads=1 --nocapture
